<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Student Club</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f4f4f4;
        }

        /* Navbar */
        nav{
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #2c0662;
            color: white;
            padding: 10px;
        }

        nav img{
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        nav h1{
            flex: 1;
            margin-left: 15px;
        }

        nav ul{
            display: flex;
            list-style: none;
        }

        nav ul li{
            margin: 0 15px;
        }

        nav ul li a{
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav ul li a:hover{
            color: #ffcc00;
        }
        h2 {
            color: #333;
            text-align: center;
            padding: 20px 0;
        }
        p {
            text-align: center;
            color: #666;
        }
        form {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 20px auto;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    
  <nav>
    <img src="https://cdn2.f-cdn.com/contestentries/1743995/29500885/5e864644a79ea_thumb900.jpg" alt="Logo">
    <h1>Technical Club</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contact.html">Contact Us</a></li>
      <li><a href="about.html">About Us</a></li>
    </ul>
  </nav>

    <h2>Contact Us</h2>
    <p>Get in touch with the Technical Club. We'd love to hear from you!</p>
    
    <form action="#" method="post">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" required></textarea><br><br>
        
        <input type="submit" value="Send Message">
    </form>
</body>
</html>
